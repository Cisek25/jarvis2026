<!-- CTA Bar -->
<div class="{prefix}-full">
  <div class="{prefix}-cta-bar">
    <div class="{prefix}-inner">
      <div class="{prefix}-cta-bar__content">
        <h2 class="{prefix}-cta-bar__title">{cta_title}</h2>
        <p class="{prefix}-cta-bar__sub">{cta_subtitle}</p>
      </div>
      <div class="{prefix}-cta-bar__actions">
        <a href="{booking_url}" class="{prefix}-btn {prefix}-btn--lg">{primary_text}</a>
        <a href="{secondary_url}" class="{prefix}-btn {prefix}-btn--ghost">{secondary_text}</a>
      </div>
    </div>
  </div>
</div>
