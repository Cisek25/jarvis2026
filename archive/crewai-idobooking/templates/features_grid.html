<!-- Grid udogodnien / cech -->
<div class="{prefix}-features">
  <!-- Powtorz dla kazdej cechy -->
  <div class="{prefix}-feature">
    <div class="{prefix}-feature__icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- {icon_path} -->
      </svg>
    </div>
    <h3 class="{prefix}-feature__title">{feature_title}</h3>
    <p class="{prefix}-feature__desc">{feature_desc}</p>
  </div>
  <!-- /Powtorz -->
</div>
