<!-- Album galerii -->
<div class="{prefix}-album">
  <h3 class="{prefix}-h3">{album_title}</h3>
  <p class="{prefix}-photos-count">{photo_count} zdjec</p>
  <div class="{prefix}-album__grid">
    <!-- Powtorz dla kazdego zdjecia -->
    <a href="{full_url}" class="{prefix}-album__thumb" data-lightbox="{album_id}">
      <img src="{thumb_url}" alt="{alt_text}" loading="lazy">
    </a>
    <!-- /Powtorz -->
  </div>
</div>
