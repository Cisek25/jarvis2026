<!-- §0 HERO -->
<div class="{prefix}-full">
  <div class="{prefix}-hero">
    <img src="{hero_image}" alt="{alt_text}" class="{prefix}-hero__img" loading="eager">
    <div class="{prefix}-hero__overlay">
      <div class="{prefix}-inner">
        <h1 class="{prefix}-hero__title">{title}</h1>
        <p class="{prefix}-hero__sub">{subtitle}</p>
        <a href="{booking_url}" class="{prefix}-btn {prefix}-btn--lg">{cta_text}</a>
      </div>
    </div>
  </div>
</div>
