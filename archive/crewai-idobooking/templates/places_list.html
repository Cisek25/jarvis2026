<!-- Lista miejsc / atrakcji -->
<div class="{prefix}-places">
  <!-- Powtorz dla kazdego miejsca -->
  <div class="{prefix}-place">
    <div class="{prefix}-place__img">
      <img src="{image_url}" alt="{place_name}" loading="lazy">
    </div>
    <div class="{prefix}-place__info">
      <h3 class="{prefix}-h3">{place_name}</h3>
      <span class="{prefix}-place__dist">{distance}</span>
      <p class="{prefix}-intro">{description}</p>
    </div>
  </div>
  <!-- /Powtorz -->
</div>
