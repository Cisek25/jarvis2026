<!-- Split: obraz + tekst (50/50) -->
<div class="{prefix}-split">
  <div class="{prefix}-split__media">
    <img src="{image_url}" alt="{alt_text}" loading="lazy">
  </div>
  <div class="{prefix}-split__text">
    <span class="{prefix}-label">{label}</span>
    <h2 class="{prefix}-h2">{heading}</h2>
    <p class="{prefix}-lead">{lead}</p>
    {content}
    <a href="{link_url}" class="{prefix}-btn">{link_text}</a>
  </div>
</div>
