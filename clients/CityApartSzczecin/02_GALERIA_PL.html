<!-- ============================================
     CityApart Szczecin — Galeria Styling
     Wklej do: CMS > txt/200 > Galeria (body)
     ============================================ -->

<style>
/* === CityApart Gallery Styling === */

/* Nagłówek galerii */
.big-label {
  font-family: 'Signika', sans-serif;
  color: #1a365d;
  text-align: center;
  margin-bottom: 0.3em;
}

/* Podpis pod nagłówkiem */
.ca-galeria-sub {
  text-align: center;
  color: #64748b;
  font-size: 1.05rem;
  margin-bottom: 2rem;
  letter-spacing: 0.02em;
}

/* Kontener galerii */
.gallery-lightbox.row {
  max-width: 1200px;
  margin: 0 auto 3rem auto;
  padding: 0 0.5rem;
}

/* Pojedyncze zdjęcie */
.gallery-lightbox .gallery-sub {
  padding: 6px !important;
  margin-bottom: 0;
}

.gallery-lightbox .gallery-sub a {
  display: block;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(26,54,93,0.10);
  transition: box-shadow 0.35s ease, transform 0.35s ease;
}

.gallery-lightbox .gallery-sub a:hover {
  box-shadow: 0 8px 32px rgba(26,54,93,0.22);
  transform: translateY(-4px);
}

/* Overlay na hover */
.gallery-lightbox .gallery-sub a::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    transparent 50%,
    rgba(26,54,93,0.35) 100%
  );
  opacity: 0;
  transition: opacity 0.35s ease;
  border-radius: 12px;
  pointer-events: none;
}

.gallery-lightbox .gallery-sub a:hover::after {
  opacity: 1;
}

/* Ikona lupy na hover */
.gallery-lightbox .gallery-sub a::before {
  content: '\f00e'; /* fa-search-plus */
  font-family: 'Font Awesome 5 Free', 'FontAwesome', sans-serif;
  font-weight: 900;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  font-size: 1.6rem;
  color: #fff;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  pointer-events: none;
}

.gallery-lightbox .gallery-sub a:hover::before {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Zdjęcia */
.gallery-lightbox .gallery-sub img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
  border-radius: 12px;
  transition: transform 0.5s ease;
}

.gallery-lightbox .gallery-sub a:hover img {
  transform: scale(1.05);
}

/* === Responsywność === */

/* Desktop — 3 kolumny */
@media (min-width: 768px) {
  .gallery-lightbox .gallery-sub img {
    height: 280px;
  }
}

/* Duży desktop — wyższe zdjęcia */
@media (min-width: 1200px) {
  .gallery-lightbox .gallery-sub img {
    height: 300px;
  }
}

/* Tablet — 2 kolumny (domyślne col-6 z IdoSell) */
@media (max-width: 767px) {
  .gallery-lightbox .gallery-sub img {
    height: 200px;
  }
  .gallery-lightbox .gallery-sub {
    padding: 4px !important;
  }
  .gallery-lightbox .gallery-sub a {
    border-radius: 8px;
  }
  .gallery-lightbox .gallery-sub img {
    border-radius: 8px;
  }
}

/* Mobile — mniejsze zaokrąglenia */
@media (max-width: 480px) {
  .gallery-lightbox .gallery-sub img {
    height: 170px;
  }
  .gallery-lightbox .gallery-sub a::before {
    font-size: 1.2rem;
  }
}

/* === Lightbox overlay poprawki === */
#imagelightbox-overlay {
  background: rgba(26,54,93,0.92) !important;
}

#imagelightbox-close {
  top: 20px;
  right: 20px;
}
</style>

<p class="ca-galeria-sub">Odkryj wnętrza naszych apartamentów i najbliższą okolicę</p>
