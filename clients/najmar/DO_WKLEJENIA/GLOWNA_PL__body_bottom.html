<!-- Najmar Apartamenty — Global JS -->
<script>
(function() {
  'use strict';

  // §1 — Scroll Reveal Animation
  // Uses IntersectionObserver to animate .nj-reveal elements on scroll
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('nj-revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.nj-reveal').forEach(el => revealObserver.observe(el));

  // §2 — Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', function(e) {
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // §3 — Mobile menu enhancement
  const menuToggle = document.querySelector('.navbar-toggler');
  if (menuToggle) {
    menuToggle.addEventListener('click', function() {
      document.body.classList.toggle('nj-menu-open');
    });
  }

  // §4 — Lazy loading for images
  if ('loading' in HTMLImageElement.prototype) {
    document.querySelectorAll('img[loading="lazy"]').forEach(img => {
      if (img.dataset.src) {
        img.src = img.dataset.src;
      }
    });
  }

  // §5 — Search widget placeholders (system inputs have no placeholders)
  // System bug: date inputs get value "NaN-aN-aN" — must clear before placeholder works
  function setSearchPlaceholders() {
    var loc = document.getElementById('iai_booking_location');
    if (loc) {
      if (!loc.value) loc.value = 'Żywiec';
      loc.placeholder = 'Żywiec';
    }

    var from = document.getElementById('iai_booking_date_from');
    if (from) {
      if (!from.value || from.value === 'NaN-aN-aN' || from.value.indexOf('NaN') !== -1) {
        from.value = '';
      }
      from.placeholder = 'Przyjazd';
    }

    var to = document.getElementById('iai_booking_date_to');
    if (to) {
      if (!to.value || to.value === 'NaN-aN-aN' || to.value.indexOf('NaN') !== -1) {
        to.value = '';
      }
      to.placeholder = 'Wyjazd';
    }

    var persons = document.getElementById('iai_booking_persons');
    if (persons && !persons.value) persons.placeholder = 'Osoby';
  }
  // Run immediately and after short delays (form loads async, system may re-set values)
  setSearchPlaceholders();
  setTimeout(setSearchPlaceholders, 500);
  setTimeout(setSearchPlaceholders, 1500);
  setTimeout(setSearchPlaceholders, 3000);

  // §6 — Offers page: collapse all filters by default + add toggle
  // System has NO toggle JS — filters are always open. We add collapsible behavior.
  if (document.body.classList.contains('page-offers')) {
    // Remove .show so CSS hides filter content
    document.querySelectorAll('.filter_content.collapse.show').forEach(function(el) {
      el.classList.remove('show');
    });
    // Add click toggle to each filter header
    document.querySelectorAll('.filter_header').forEach(function(header) {
      header.addEventListener('click', function() {
        var content = this.nextElementSibling;
        if (content && content.classList.contains('filter_content')) {
          content.classList.toggle('show');
        }
      });
    });
  }

  // §7 — FAQ accordion toggle (Dla Właścicieli + any page with .nj-faq-item__btn)
  // CMS body_top strips <script> tags, so FAQ JS MUST be in body_bottom.
  document.querySelectorAll('.nj-faq-item__btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      var answerId = btn.getAttribute('aria-controls');
      var answer = document.getElementById(answerId);
      if (!answer) return;
      if (expanded) {
        btn.setAttribute('aria-expanded', 'false');
        answer.hidden = true;
        answer.setAttribute('hidden', '');
      } else {
        btn.setAttribute('aria-expanded', 'true');
        answer.hidden = false;
        answer.removeAttribute('hidden');
      }
    });
  });

  // §8 — Auto-pull phone + email from footer into CTA contacts
  // So when user changes phone in panel, it auto-updates on Dla Właścicieli page too.
  var footerPhone = document.querySelector('footer a[href^="tel:"], [role="contentinfo"] a[href^="tel:"]');
  var ctaPhone = document.querySelector('.nj-cta-contact[href^="tel:"]');
  if (footerPhone && ctaPhone) {
    ctaPhone.href = footerPhone.href.replace(/\s/g, '');
    var phoneVal = ctaPhone.querySelector('.nj-cta-contact__value');
    if (phoneVal) phoneVal.textContent = footerPhone.textContent.trim();
  }
  var footerEmail = document.querySelector('footer a[href^="mailto:"], [role="contentinfo"] a[href^="mailto:"]');
  var ctaEmail = document.querySelector('.nj-cta-contact[href^="mailto:"]');
  if (footerEmail && ctaEmail) {
    ctaEmail.href = footerEmail.href;
    var emailVal = ctaEmail.querySelector('.nj-cta-contact__value');
    if (emailVal) emailVal.textContent = footerEmail.textContent.trim();
  }

})();
</script>
