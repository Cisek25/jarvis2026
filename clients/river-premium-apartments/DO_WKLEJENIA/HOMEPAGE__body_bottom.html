<style id="riv-v15-safety-net">
body.page-index .iai-search,
body.page-index #iai_book_form,
body.page-index #iai_book_se,
body.page-index .index-info .iai-search,
body.page-index .index-info #iai_book_form {

}
body.page-index .index-info > h1,
body.page-index .index-info > h2,
body.page-index .index-info > button,
body.page-index .index-info > .navbar-reservation,
body.page-index .index-info > div:not(.riv-hero):not(.riv-hero__content) {
  display: none !important;
}
body.page-index .riv-hero,
body.page-index .section.parallax .riv-hero,
body.page-index .section.parallax .fp-tableCell .riv-hero {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  flex-wrap: nowrap !important;
  width: 100% !important;
  max-width: 100% !important;
  min-height: 100vh !important;
  padding: 120px 24px 80px !important;

body.page-index .riv-hero__content {
  position: relative;
  z-index: 6;
  max-width: 900px;

body.page-index .riv-hero__title {
  color: #FFFFFF !important;
  font-size: 56px !important;
  line-height: 1.1 !important;
  text-shadow: 0 4px 20px rgba(0,0,0,0.4);
  margin: 0 0 16px;

body.page-index .riv-hero__subtitle {
  color: rgba(255,255,255,0.95) !important;
  font-size: 18px !important;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  margin: 0;
}
body.page-index .section.parallax > .fp-tableCell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(rgba(5,27,61,0.35), rgba(5,27,61,0.55));
  z-index: 2;
  pointer-events: none;

body.page-index .parallax-slider { z-index: 1 !important; }
body.page-index .riv-hero .riv-search,
body.page-index .section.parallax .riv-search,
body.page-index .section.parallax .fp-tableCell .riv-search {
  position: relative !important;
  margin: 40px auto 0 !important;
  width: 100% !important;
  max-width: 900px !important;
  left: auto !important;
  right: auto !important;
  transform: none !important;

body.page-index header.default13,
body.page-index header,
body.page-index .menu-wrapper,

  body.page-index .riv-hero__title { font-size: 36px !important; }
  body.page-index .riv-hero__subtitle { font-size: 16px !important; }
  body.page-index .section.parallax .fp-tableCell .riv-hero { padding: 100px 16px 40px !important; }
}
body.page-index .riv-apartments-section,
section.riv-apartments-section {
  display: block !important;
  grid-template-columns: none !important;
}
body.page-index .riv-apartments-grid {
  display: grid !important;
  grid-template-columns: repeat(2, 1fr) !important;
  width: 100% !important;
  max-width: 1280px !important;
  margin: 0 auto !important;
  padding: 0 !important;
  gap: 32px !important;
}
@media (max-width: 991px) {
  body.page-index .riv-apartments-grid { grid-template-columns: 1fr !important; }
}
body.page-index .riv-apartments-grid .riv-offer-card {
  width: 100%;
  min-width: 0;

</style>
<script>
(function() {
  'use strict';

  var CONFIG = {
    clientId: '58463',
    engineFallback: 'https://engine58463.idobooking.com/',
    preferSystemForm: true
  };

  /* === 1. fullpage.js detection — header transparent on section 1 === */
  function setupFullpageHeader() {
    var body = document.body;
    var headerWrapper = document.querySelector('.menu-wrapper') || document.querySelector('header');
    if (!headerWrapper) return;

    function updateHeader() {
      var match = body.className.match(/fp-viewing-(\d+)/);
      var section = match ? parseInt(match[1], 10) : -1;
      if (section === 0 || section === 1) {
        document.documentElement.classList.add('riv-header--transparent');
      } else {
        document.documentElement.classList.remove('riv-header--transparent');
      }
    }

    var observer = new MutationObserver(updateHeader);
    observer.observe(body, { attributes: true, attributeFilter: ['class'] });
    updateHeader();
  }

  /* === 2. Hero teleport — body_top hero into .section.parallax .fp-tableCell === */
  function teleportHero() {
    var hero = document.querySelector('.riv-hero');
    var target = document.querySelector('.section.parallax .fp-tableCell')
              || document.querySelector('.fp-section .fp-tableCell');
    if (hero && target && !target.contains(hero)) {
      target.appendChild(hero);
    }
  }

  /* === 3. Featured offers reader (MADERA pattern) === */
  function buildRivCards(gridSelector) {
    var hotspot = document.querySelector('.container-hotspot, .cmshotspot');
    var grid = document.querySelector(gridSelector);
    if (!hotspot || !grid) return;

    var slides = hotspot.querySelectorAll('.slick-slide:not(.slick-cloned) .offer, .offer');
    var cards = [];
    var seen = {};

    Array.prototype.forEach.call(slides, function(offer) {
      var hrefEl = offer.querySelector('a.object-icon, a[href*="offer"], a[href*="oferta"]');
      if (!hrefEl) return;
      var href = hrefEl.href;
      if (seen[href]) return;
      seen[href] = true;

      var imgEl = offer.querySelector('img[data-src], img[src]:not([src*="img-blank"])');
      var img = imgEl ? (imgEl.dataset.src || imgEl.src) : '';
      var title = (offer.querySelector('h3 a, h3, .offer__name') || {}).textContent;
      var desc = (offer.querySelector('.offer__description, .offer-description') || {}).textContent;
      var areaMatch = ((offer.querySelector('.accommodation-meters, [class*="meters"]') || {}).textContent || '').match(/([\d,.]+)\s*m/i);
      var guestsMatch = ((offer.querySelector('.accommodation-roomspace, [class*="roomspace"], [class*="persons"]') || {}).textContent || '').match(/(\d+)/);
      var priceMatch = ((offer.querySelector('.offer__price .price, .offer-price, [class*="price"]') || {}).textContent || '').match(/([\d,.]+)/);

      cards.push({
        href: href,
        img: img,
        title: (title || '').trim(),
        desc: (desc || '').trim(),
        area: areaMatch ? areaMatch[1] : '',
        guests: guestsMatch ? guestsMatch[1] : '',
        price: priceMatch ? priceMatch[1] : ''
      });
    });

    if (!cards.length) return;

    grid.innerHTML = cards.map(function(c) {
      var meta = '';
      if (c.area || c.guests) {
        meta = '<ul class="riv-offer-card__meta">';
        if (c.area) meta += '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18"/></svg>' + c.area + ' m²</li>';
        if (c.guests) meta += '<li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0 1 16 0v2"/></svg>' + c.guests + ' os.</li>';
        meta += '</ul>';
      }
      return '<article class="riv-offer-card">' +
        '<a href="' + c.href + '" class="riv-offer-card__media">' +
          (c.img ? '<img src="' + c.img + '" alt="' + c.title + '" loading="lazy" class="riv-offer-card__img"/>' : '') +
          (c.price ? '<span class="riv-offer-card__badge">od ' + c.price + ' zł/noc</span>' : '') +
        '</a>' +
        '<div class="riv-offer-card__body">' +
          '<h3 class="riv-offer-card__name">' + c.title + '</h3>' +
          (c.desc ? '<p class="riv-offer-card__desc">' + c.desc + '</p>' : '') +
          meta +
          '<a href="' + c.href + '" class="riv-offer-card__cta">Sprawdź</a>' +
        '</div>' +
      '</article>';
    }).join('');
    grid.classList.remove('riv-featured-fallback');
  }

  /* === 4. Litepicker init (dual-month, range mode, pl-PL) — replaces native date pickers === */
  function initLitepicker() {
    var form = document.getElementById('riv-search-form');
    if (!form) return;
    var triggerFrom = document.getElementById('riv-trigger-from');
    var triggerTo = document.getElementById('riv-trigger-to');
    var inputFrom = document.getElementById('riv-date-from');
    var inputTo = document.getElementById('riv-date-to');
    if (!triggerFrom || !triggerTo) return;

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function fmt(d) { return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear(); }
    function updateDisplay(boxKey, date) {
      var box = boxKey === 'from' ? triggerFrom : triggerTo;
      if (!box || !date) return;
      box.querySelector('[data-day-' + boxKey + ']').textContent = pad(date.getDate());
      box.querySelector('[data-month-' + boxKey + ']').textContent = pad(date.getMonth() + 1);
      box.querySelector('[data-year-' + boxKey + ']').textContent = String(date.getFullYear()).slice(2);
      var input = boxKey === 'from' ? inputFrom : inputTo;
      if (input) input.value = fmt(date);
    }

    /* Default dates: tomorrow + day after */
    var today = new Date();
    var d1 = new Date(today.getTime() + 24 * 60 * 60 * 1000);
    var d2 = new Date(today.getTime() + 48 * 60 * 60 * 1000);
    updateDisplay('from', d1);
    updateDisplay('to', d2);

    /* Wait for Litepicker library (CDN defer) */
    function tryInit() {
      if (typeof Litepicker === 'undefined') {
        setTimeout(tryInit, 100);
        return;
      }
      var picker = new Litepicker({
        element: triggerFrom,
        elementEnd: triggerTo,
        singleMode: false,
        numberOfMonths: 2,
        numberOfColumns: 2,
        minDate: today,
        startDate: d1,
        endDate: d2,
        format: 'DD.MM.YYYY',
        lang: 'pl-PL',
        autoApply: true,
        tooltipText: { one: 'noc', other: 'nocy' },
        tooltipNumber: function(totalDays) { return totalDays - 1; },
        setup: function(picker) {
          picker.on('selected', function(startDate, endDate) {
            if (startDate && startDate.dateInstance) updateDisplay('from', startDate.dateInstance);
            if (endDate && endDate.dateInstance) updateDisplay('to', endDate.dateInstance);
          });
        }
      });

      /* Mobile fallback: open Litepicker on box click */
      triggerFrom.addEventListener('click', function(e) {
        e.preventDefault();
        picker.show(triggerFrom);
      });
      triggerTo.addEventListener('click', function(e) {
        e.preventDefault();
        picker.show(triggerTo);
      });
    }
    tryInit();
  }

  /* === 5. Search form submit (system #iai_book_form preferred, fallback engine) === */
  function setupSearchForm() {
    var form = document.getElementById('riv-search-form');
    if (!form) return;
    var inputFrom = document.getElementById('riv-date-from');
    var inputTo = document.getElementById('riv-date-to');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var values = {
        dateFrom: inputFrom ? inputFrom.value : '',
        dateTo: inputTo ? inputTo.value : '',
        persons: '2'
      };

      if (CONFIG.preferSystemForm) {
        var sysForm = document.querySelector('#iai_book_form, form.book-form, form[action*="engine"]');
        if (sysForm) {
          /* Convert dd.mm.yyyy to system format (try multiple) */
          var nameMap = {
            dateFrom: ['checkin', 'checkin_date', 'date_from', 'dateFrom', 'arrival', 'from'],
            dateTo: ['checkout', 'checkout_date', 'date_to', 'dateTo', 'departure', 'to'],
            persons: ['persons', 'guests', 'adults']
          };
          for (var key in nameMap) {
            for (var i = 0; i < nameMap[key].length; i++) {
              var el = sysForm.querySelector('[name="' + nameMap[key][i] + '"]');
              if (el) { el.value = values[key]; break; }
            }
          }
          sysForm.submit();
          return;
        }
      }

      var params = new URLSearchParams();
      if (values.dateFrom) params.set('checkin', values.dateFrom);
      if (values.dateTo) params.set('checkout', values.dateTo);
      params.set('persons', values.persons);
      window.location.href = CONFIG.engineFallback + 'widget/index.php?' + params.toString();
    });
  }

  /* === 6. /offers filters collapsed by default (TRAP CRITICAL-CC) === */
  function initOffersFilters() {
    if (!document.body.classList.contains('page-offers')) return;
    var filters = document.querySelectorAll('.filter_content.collapse');
    var headers = document.querySelectorAll('.filter_header');
    if (!filters.length || !headers.length) return;

    filters.forEach(function(f) { f.classList.remove('show'); });

    headers.forEach(function(h) {
      h.setAttribute('aria-expanded', 'false');
      h.setAttribute('role', 'button');
      h.setAttribute('tabindex', '0');
      if (h.dataset.rivFilterInit) return;
      h.dataset.rivFilterInit = 'true';

      h.addEventListener('click', function() {
        var match = h.id.match(/filter_header_(.+)/);
        if (!match) return;
        var content = document.getElementById('filter_' + match[1] + '_content');
        if (!content) return;
        var expanded = h.getAttribute('aria-expanded') === 'true';
        h.setAttribute('aria-expanded', !expanded);
        content.classList.toggle('show');
      });

      h.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          h.click();
        }
      });
    });
  }

  /* === 7. Init === */
  function init() {
    setupFullpageHeader();
    teleportHero();
    buildRivCards('.riv-apartments-grid');
    initLitepicker();
    setupSearchForm();
    initOffersFilters();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
