<!-- §5  JS — Lightbox + filtry -->
<script>
(function(){
  var items = document.querySelectorAll('#wb-gallery-grid .wb-gallery__item');
  var lb = document.getElementById('wb-lightbox');
  var lbImg = document.getElementById('wb-lb-img');
  var lbCounter = document.getElementById('wb-lb-counter');
  var current = 0;

  /* Lightbox */
  function getVisible(){ return Array.from(items); }

  function openLB(idx){
    var v = getVisible(); current = idx;
    lbImg.src = v[current].querySelector('img').src;
    lbImg.alt = v[current].querySelector('img').alt;
    lbCounter.textContent = (current+1)+' / '+v.length;
    lb.classList.add('wb-lightbox--open');
    document.body.style.overflow = 'hidden';
  }
  function closeLB(){ lb.classList.remove('wb-lightbox--open'); document.body.style.overflow = ''; }
  function nav(dir){
    var v = getVisible(); current = (current+dir+v.length)%v.length;
    lbImg.src = v[current].querySelector('img').src;
    lbImg.alt = v[current].querySelector('img').alt;
    lbCounter.textContent = (current+1)+' / '+v.length;
  }

  items.forEach(function(item){
    item.addEventListener('click', function(){ var v = getVisible(); var idx = v.indexOf(item); if(idx!==-1) openLB(idx); });
  });
  document.getElementById('wb-lb-close').addEventListener('click', function(e){ e.stopPropagation(); closeLB(); });
  document.getElementById('wb-lb-prev').addEventListener('click', function(e){ e.stopPropagation(); nav(-1); });
  document.getElementById('wb-lb-next').addEventListener('click', function(e){ e.stopPropagation(); nav(1); });
  lb.addEventListener('click', function(e){ if(e.target===lb) closeLB(); });
  document.addEventListener('keydown', function(e){
    if(!lb.classList.contains('wb-lightbox--open')) return;
    if(e.key==='Escape') closeLB();
    if(e.key==='ArrowLeft') nav(-1);
    if(e.key==='ArrowRight') nav(1);
  });

  /* Responsive kolumny */
  function setCols(){
    var g = document.getElementById('wb-gallery-grid'); if(!g) return;
    var w = window.innerWidth;
    g.style.gridTemplateColumns = w<=480?'repeat(2,1fr)':w<=768?'repeat(3,1fr)':w<=1024?'repeat(4,1fr)':'repeat(5,1fr)';
  }
  setCols(); window.addEventListener('resize', setCols);
})();
</script>
